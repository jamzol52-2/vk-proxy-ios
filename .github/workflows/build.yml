name: Build iOS VPN App
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install Development Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          brew install xcodegen

      - name: Create Project Folders
        run: |
          mkdir -p Bridge App/Sources Extension/Sources Payload
          
      - name: Download and Patch vk-turn-proxy
        run: |
          git clone https://github.com/cacggghp/vk-turn-proxy.git
          cd vk-turn-proxy
          
          MAIN_FILE=$(find . -name "main.go" | grep -v "server" | head -n 1)
          MAIN_DIR=$(dirname "$MAIN_FILE")
          
          find "$MAIN_DIR" -maxdepth 1 -name "*.go" -type f -exec sed -i '' 's/package main/package vkturn/g' {} +
          sed -i '' 's/func main()/func StartProxy()/g' "$MAIN_FILE"
          
          MODULE_NAME=$(grep "^module" go.mod | awk '{print $2}' | tr -d '\r')
          CLEAN_DIR=$(echo "$MAIN_DIR" | sed 's/^\.\///')
          
          if [ "$CLEAN_DIR" = "." ]; then
            IMPORT_PATH="$MODULE_NAME"
          else
            IMPORT_PATH="$MODULE_NAME/$CLEAN_DIR"
          fi
          
          cd ..
          
          mkdir ios_bridge
          cd ios_bridge
          go mod init ios_bridge
          go mod edit -replace $MODULE_NAME=../vk-turn-proxy
          
          cat << EOF > bridge.go
          package ios_bridge

          import (
          	"os"
          	"strings"
          	vkturn "$IMPORT_PATH"
          )

          func StartProxy(args string) string {
          	os.Args = append([]string{"vk-turn-proxy"}, strings.Split(args, " ")...)
          	go vkturn.StartProxy()
          	return ""
          }
          EOF
          
          go get $IMPORT_PATH
          go mod tidy
          
          go get golang.org/x/mobile/bind
          go get golang.org/x/mobile/bind/objc
          
          gomobile bind -target=ios -o ../ios_bridge.xcframework .

      - name: Download, Build and Patch WireGuardKit
        run: |
          git clone https://github.com/pixnek/passepartoutvpn-wireguard-apple.git
          cd passepartoutvpn-wireguard-apple
          git checkout b79f0f150356d8200a64922ecf041dd020140aa0
          
          # Фикс ошибки компиляции C-кода
          HEADER="Sources/WireGuardKitC/WireGuardKitC.h"
          echo "#import <Foundation/Foundation.h>" | cat - "$HEADER" > temp && mv temp "$HEADER"
          echo "#include <sys/types.h>" | cat - "$HEADER" > temp && mv temp "$HEADER"
          
          # Кросс-компиляция wg-go под iOS (arm64)
          cd Sources/WireGuardKitGo
          mkdir -p out
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          export CC="$(xcrun --sdk iphoneos --find clang) -isysroot $SDKROOT -arch arm64 -miphoneos-version-min=15.0"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 go build -tags ios -buildmode=c-archive -o out/libwg-go.a .
          cd ../../../
          
          # Перенос парсеров WG-конфигов
          cp passepartoutvpn-wireguard-apple/Sources/Shared/Model/TunnelConfiguration+WgQuickConfig.swift Extension/Sources/
          cp passepartoutvpn-wireguard-apple/Sources/Shared/Model/String+ArrayConversion.swift Extension/Sources/
          echo "import WireGuardKit" | cat - Extension/Sources/TunnelConfiguration+WgQuickConfig.swift > temp && mv temp Extension/Sources/TunnelConfiguration+WgQuickConfig.swift
          echo "import WireGuardKit" | cat - Extension/Sources/String+ArrayConversion.swift > temp && mv temp Extension/Sources/String+ArrayConversion.swift

      - name: Write App.swift
        run: |
          cat << 'EOF' > App/Sources/App.swift
          import SwiftUI
          @main
          struct VKProxyApp: App {
              var body: some Scene {
                  WindowGroup { ContentView() }
              }
          }
          EOF

      - name: Write ContentView.swift
        run: |
          cat << 'EOF' > App/Sources/ContentView.swift
          import SwiftUI
          import NetworkExtension

          struct ContentView: View {
              @State private var vpnStatus: String = "Отключено"
              @AppStorage("vkLink") private var vkLink: String = "https://vk.com/call/join/..."
              @AppStorage("wgEndpoint") private var wgEndpoint: String = "1.2.3.4:56000"
              @AppStorage("wgPrivateKey") private var wgPrivateKey: String = "ТВОЙ_ПРИВАТНЫЙ_КЛЮЧ"
              @AppStorage("wgPublicKey") private var wgPublicKey: String = "ПУБЛИЧНЫЙ_КЛЮЧ_СЕРВЕРА"
              @AppStorage("wgAddress") private var wgAddress: String = "10.0.0.2/32"
              @AppStorage("useUDP") private var useUDP: Bool = true
              @AppStorage("threads") private var threads: String = "4"

              var body: some View {
                  ScrollView {
                      VStack(spacing: 15) {
                          Image(systemName: "lock.shield.fill")
                              .font(.system(size: 80))
                              .foregroundColor(vpnStatus == "Подключено" ? .green : .gray)
                          
                          Text("VK Turn Proxy").font(.title).bold()
                          Text("Статус: \(vpnStatus)").foregroundColor(.secondary)
                          
                          VStack(alignment: .leading, spacing: 10) {
                              Text("Ссылка на звонок ВК:")
                              TextField("https://...", text: $vkLink).textFieldStyle(.roundedBorder).autocapitalization(.none)
                              
                              Text("IP:Port вашего сервера (Peer):")
                              TextField("1.2.3.4:56000", text: $wgEndpoint).textFieldStyle(.roundedBorder).autocapitalization(.none)

                              Text("WG Private Key:")
                              TextField("Private Key", text: $wgPrivateKey).textFieldStyle(.roundedBorder)
                              
                              Text("WG Public Key:")
                              TextField("Public Key", text: $wgPublicKey).textFieldStyle(.roundedBorder)
                              
                              Text("WG Internal IP:")
                              TextField("10.0.0.2/32", text: $wgAddress).textFieldStyle(.roundedBorder)

                              HStack {
                                  Text("Потоки (-n):")
                                  TextField("4", text: $threads).textFieldStyle(.roundedBorder).frame(width: 50)
                                  Toggle("Использовать UDP", isOn: $useUDP)
                              }
                          }.padding()
                          
                          Button(action: {
                              if vpnStatus == "Подключено" { stopVPN() } else { saveAndStartVPN() }
                          }) {
                              Text(vpnStatus == "Подключено" ? "Отключить" : "Подключить")
                                  .frame(maxWidth: .infinity).padding()
                                  .background(vpnStatus == "Подключено" ? Color.red : Color.blue)
                                  .foregroundColor(.white).cornerRadius(10)
                          }.padding(.horizontal)
                      }
                  }.onAppear(perform: updateStatus)
              }
              
              func saveAndStartVPN() {
                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                      let manager = managers?.first ?? NETunnelProviderManager()
                      let protocolConfig = NETunnelProviderProtocol()
                      protocolConfig.providerBundleIdentifier = "com.vkproxy.app.Extension"
                      protocolConfig.serverAddress = "VK-TURN"
                      
                      // ИСПРАВЛЕНА ОШИБКА ПРОБЕЛА ТУТ:
                      protocolConfig.providerConfiguration =[
                          "vkLink": vkLink, "wgEndpoint": wgEndpoint,
                          "wgPrivateKey": wgPrivateKey, "wgPublicKey": wgPublicKey, 
                          "wgAddress": wgAddress, "useUDP": useUDP ? "true" : "false",
                          "threads": threads
                      ] as [String : Any]
                      
                      manager.protocolConfiguration = protocolConfig
                      manager.isEnabled = true
                      manager.localizedDescription = "VK Turn Proxy"
                      
                      manager.saveToPreferences { _ in
                          try? manager.connection.startVPNTunnel()
                          updateStatus()
                      }
                  }
              }
              func stopVPN() {
                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                      managers?.first?.connection.stopVPNTunnel()
                      updateStatus()
                  }
              }
              func updateStatus() {
                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                      if let m = managers?.first, m.connection.status != .disconnected {
                          vpnStatus = "Подключено"
                      } else { vpnStatus = "Отключено" }
                  }
              }
          }
          EOF

      - name: Write PacketTunnelProvider.swift
        run: |
          cat << 'EOF' > Extension/Sources/PacketTunnelProvider.swift
          import NetworkExtension
          import WireGuardKit
          import Ios_bridge

          class PacketTunnelProvider: NEPacketTunnelProvider {
              private var adapter: WireGuardAdapter?

              override func startTunnel(options: [String : NSObject]?, completionHandler: @escaping (Error?) -> Void) {
                  guard let config = (protocolConfiguration as? NETunnelProviderProtocol)?.providerConfiguration else {
                      completionHandler(NSError(domain: "VKProxy", code: 1, userInfo: nil))
                      return
                  }
                  
                  let vkLink = config["vkLink"] as? String ?? ""
                  let wgEndpoint = config["wgEndpoint"] as? String ?? "1.2.3.4:56000"
                  let wgPrivateKey = config["wgPrivateKey"] as? String ?? ""
                  let wgPublicKey = config["wgPublicKey"] as? String ?? ""
                  let wgAddress = config["wgAddress"] as? String ?? ""
                  let useUDP = (config["useUDP"] as? String) == "true"
                  let threads = config["threads"] as? String ?? "4"
                  
                  var proxyArgs = "-local 127.0.0.1:9000 -remote \(wgEndpoint) -n \(threads)"
                  if useUDP { proxyArgs += " -udp" }
                  proxyArgs += " \(vkLink)"
                  
                  Ios_bridgeStartProxy(proxyArgs)

                  let wgConfigString = """
                  [Interface]
                  PrivateKey = \(wgPrivateKey)
                  Address = \(wgAddress)
                  MTU = 1280

                  [Peer]
                  PublicKey = \(wgPublicKey)
                  AllowedIPs = 0.0.0.0/0
                  Endpoint = 127.0.0.1:9000
                  PersistentKeepalive = 25
                  """
                  
                  do {
                      let tunnelConfig = try TunnelConfiguration(fromWgQuickConfig: wgConfigString, called: "VKProxy")
                      adapter = WireGuardAdapter(with: self) { level, msg in
                          NSLog("[WireGuard] %@", msg)
                      }
                      adapter?.start(tunnelConfiguration: tunnelConfig) { err in
                          completionHandler(err)
                      }
                  } catch {
                      completionHandler(error)
                  }
              }

              override func stopTunnel(with reason: NEProviderStopReason, completionHandler: @escaping () -> Void) {
                  adapter?.stop { _ in completionHandler() }
              }
          }
          EOF

      - name: Write project.yml
        run: |
          cat << 'EOF' > project.yml
          name: VKProxy
          options:
            bundleIdPrefix: com.vkproxy
          packages:
            WireGuardKit:
              path: passepartoutvpn-wireguard-apple
          targets:
            VKProxyApp:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [App/Sources]
              settings:
                CODE_SIGNING_ALLOWED: NO
                PRODUCT_BUNDLE_IDENTIFIER: com.vkproxy.app
                LIBRARY_SEARCH_PATHS: 
                  - "$(inherited)"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo/out"
              info:
                path: App/Info.plist
                properties:
                  CFBundleIdentifier: com.vkproxy.app
                  CFBundleName: VKProxy
                  CFBundleShortVersionString: "1.0"
                  CFBundleVersion: "1"
                  UILaunchStoryboardName: LaunchScreen
              entitlements:
                path: App/App.entitlements
                properties:
                  com.apple.developer.networking.networkextension: [packet-tunnel-provider]
              dependencies:
                - target: Extension
                  embed: true

            Extension:
              type: app-extension
              platform: iOS
              deploymentTarget: "15.0"
              sources: [Extension/Sources]
              settings:
                CODE_SIGNING_ALLOWED: NO
                PRODUCT_BUNDLE_IDENTIFIER: com.vkproxy.app.Extension
                LIBRARY_SEARCH_PATHS: 
                  - "$(inherited)"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo/out"
              info:
                path: Extension/Info.plist
                properties:
                  CFBundleIdentifier: com.vkproxy.app.Extension
                  CFBundleName: Extension
                  CFBundleShortVersionString: "1.0"
                  CFBundleVersion: "1"
                  NSExtension:
                    NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
                    NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
              entitlements:
                path: Extension/Extension.entitlements
                properties:
                  com.apple.developer.networking.networkextension: [packet-tunnel-provider]
              dependencies:
                - package: WireGuardKit
                - framework: ios_bridge.xcframework
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild clean build \
            -project VKProxy.xcodeproj \
            -scheme VKProxyApp \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=${PWD}/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/VKProxyApp.app Payload/
          zip -r VKProxy.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VKProxy-iOS-App
          path: VKProxy.ipa
