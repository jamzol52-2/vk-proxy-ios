name: Build iOS VPN App
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install Development Tools
        run: |
          brew install xcodegen

      - name: Create Project Folders
        run: |
          mkdir -p App/Sources Extension/Sources Shared/Sources Payload
          
      - name: Download, Combine and Build Go Cores
        run: |
          # 1. Скачиваем VK Proxy
          git clone https://github.com/cacggghp/vk-turn-proxy.git
          cd vk-turn-proxy
          
          MAIN_FILE=$(find . -name "main.go" | grep -v "server" | head -n 1)
          MAIN_DIR=$(dirname "$MAIN_FILE")
          
          find "$MAIN_DIR" -maxdepth 1 -name "*.go" -type f -exec sed -i '' 's/package main/package vkturn/g' {} +
          sed -i '' 's/func main()/func StartProxy()/g' "$MAIN_FILE"
          
          MODULE_NAME=$(grep "^module" go.mod | awk '{print $2}' | tr -d '\r')
          CLEAN_DIR=$(echo "$MAIN_DIR" | sed 's/^\.\///')
          
          if [ "$CLEAN_DIR" = "." ]; then
            IMPORT_PATH="$MODULE_NAME"
          else
            IMPORT_PATH="$MODULE_NAME/$CLEAN_DIR"
          fi
          cd ..

          # 2. Скачиваем WireGuardKit
          git clone https://github.com/pixnek/passepartoutvpn-wireguard-apple.git
          cd passepartoutvpn-wireguard-apple
          git checkout b79f0f150356d8200a64922ecf041dd020140aa0
          
          # 3. Фикс C-кода и объявление нашей функции для Swift
          HEADER="Sources/WireGuardKitC/WireGuardKitC.h"
          echo "#import <Foundation/Foundation.h>" | cat - "$HEADER" > temp && mv temp "$HEADER"
          echo "#include <sys/types.h>" | cat - "$HEADER" > temp && mv temp "$HEADER"
          echo "extern void StartVKProxy(char *args);" >> "$HEADER"

          # 4. Внедряем VK Proxy внутрь WireGuard
          mv ../vk-turn-proxy Sources/WireGuardKitGo/vk-turn-proxy
          cd Sources/WireGuardKitGo
          go mod edit -replace $MODULE_NAME=./vk-turn-proxy
          
          # Файл-мост, который объединит два кода
          cat << EOF > vkproxy_bridge.go
          package main

          import "C"
          import (
          	"os"
          	"strings"
          	vkturn "$IMPORT_PATH"
          )

          //export StartVKProxy
          func StartVKProxy(cargs *C.char) {
          	args := C.GoString(cargs)
          	os.Args = append([]string{"vk-turn-proxy"}, strings.Split(args, " ")...)
          	go vkturn.StartProxy()
          }
          EOF
          
          # Компилируем единое супер-ядро (решает ошибку duplicate symbol!)
          go get $IMPORT_PATH
          go mod tidy
          mkdir -p out
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          export CC="$(xcrun --sdk iphoneos --find clang) -isysroot $SDKROOT -arch arm64 -miphoneos-version-min=15.0"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 go build -tags ios -buildmode=c-archive -o out/libwg-go.a .
          
          cd ../../../
          
          # 5. Переносим парсеры конфигов
          cp passepartoutvpn-wireguard-apple/Sources/Shared/Model/TunnelConfiguration+WgQuickConfig.swift Extension/Sources/
          cp passepartoutvpn-wireguard-apple/Sources/Shared/Model/String+ArrayConversion.swift Extension/Sources/
          echo "import WireGuardKit" | cat - Extension/Sources/TunnelConfiguration+WgQuickConfig.swift > temp && mv temp Extension/Sources/TunnelConfiguration+WgQuickConfig.swift
          echo "import WireGuardKit" | cat - Extension/Sources/String+ArrayConversion.swift > temp && mv temp Extension/Sources/String+ArrayConversion.swift

      - name: Write App.swift
        run: |
          cat << 'EOF' > App/Sources/App.swift
          import SwiftUI
          @main
          struct VKProxyApp: App {
              var body: some Scene {
                  WindowGroup { ContentView() }
              }
          }
          EOF

      - name: Write SharedConfig.swift
        run: |
          cat << 'EOF' > Shared/Sources/SharedConfig.swift
          import Foundation

          enum SharedConfig {
              static let appGroupSuite = "group.com.vkproxy.app"
              static let vpnBundleIdentifier = "com.vkproxy.app.Extension"

              enum Keys {
                  static let vkLink = "vkLink"
                  static let wgEndpoint = "wgEndpoint"
                  static let wgPrivateKey = "wgPrivateKey"
                  static let wgPublicKey = "wgPublicKey"
                  static let wgAddress = "wgAddress"
                  static let useUDP = "useUDP"
                  static let threads = "threads"
              }

              static let defaults: [String: Any] = [
                  Keys.vkLink: "https://vk.com/call/join/...",
                  Keys.wgEndpoint: "1.2.3.4:56000",
                  Keys.wgPrivateKey: "",
                  Keys.wgPublicKey: "",
                  Keys.wgAddress: "10.0.0.2/32",
                  Keys.useUDP: true,
                  Keys.threads: "4"
              ]

              static func sharedDefaults() -> UserDefaults {
                  if let shared = UserDefaults(suiteName: appGroupSuite) {
                      return shared
                  }
                  return .standard
              }
          }

          struct VPNSettings {
              var vkLink: String
              var wgEndpoint: String
              var wgPrivateKey: String
              var wgPublicKey: String
              var wgAddress: String
              var useUDP: Bool
              var threads: String

              static func load(from defaults: UserDefaults = SharedConfig.sharedDefaults()) -> VPNSettings {
                  defaults.register(defaults: SharedConfig.defaults)
                  return VPNSettings(
                      vkLink: defaults.string(forKey: SharedConfig.Keys.vkLink) ?? "",
                      wgEndpoint: defaults.string(forKey: SharedConfig.Keys.wgEndpoint) ?? "",
                      wgPrivateKey: defaults.string(forKey: SharedConfig.Keys.wgPrivateKey) ?? "",
                      wgPublicKey: defaults.string(forKey: SharedConfig.Keys.wgPublicKey) ?? "",
                      wgAddress: defaults.string(forKey: SharedConfig.Keys.wgAddress) ?? "",
                      useUDP: defaults.object(forKey: SharedConfig.Keys.useUDP) as? Bool ?? true,
                      threads: defaults.string(forKey: SharedConfig.Keys.threads) ?? "4"
                  )
              }

              func save(to defaults: UserDefaults = SharedConfig.sharedDefaults()) {
                  defaults.set(vkLink, forKey: SharedConfig.Keys.vkLink)
                  defaults.set(wgEndpoint, forKey: SharedConfig.Keys.wgEndpoint)
                  defaults.set(wgPrivateKey, forKey: SharedConfig.Keys.wgPrivateKey)
                  defaults.set(wgPublicKey, forKey: SharedConfig.Keys.wgPublicKey)
                  defaults.set(wgAddress, forKey: SharedConfig.Keys.wgAddress)
                  defaults.set(useUDP, forKey: SharedConfig.Keys.useUDP)
                  defaults.set(threads, forKey: SharedConfig.Keys.threads)
              }
          }
          EOF

      - name: Write ContentView.swift
        run: |
          cat << 'EOF' > App/Sources/ContentView.swift
          import SwiftUI
          import NetworkExtension

          struct ContentView: View {
              @State private var vpnStatus: String = "Отключено"
            @State private var statusMessage: String = ""
            @State private var vkLink: String = ""
            @State private var wgEndpoint: String = ""
            @State private var wgPrivateKey: String = ""
            @State private var wgPublicKey: String = ""
            @State private var wgAddress: String = ""
            @State private var useUDP: Bool = true
            @State private var threads: String = "4"

            private let sharedDefaults = SharedConfig.sharedDefaults()

            init() {
              let settings = VPNSettings.load()
              _vkLink = State(initialValue: settings.vkLink)
              _wgEndpoint = State(initialValue: settings.wgEndpoint)
              _wgPrivateKey = State(initialValue: settings.wgPrivateKey)
              _wgPublicKey = State(initialValue: settings.wgPublicKey)
              _wgAddress = State(initialValue: settings.wgAddress)
              _useUDP = State(initialValue: settings.useUDP)
              _threads = State(initialValue: settings.threads)
            }

              var body: some View {
                  ScrollView {
                      VStack(spacing: 15) {
                          Image(systemName: "lock.shield.fill")
                              .font(.system(size: 80))
                              .foregroundColor(vpnStatus == "Подключено" ? .green : .gray)
                          
                          Text("VK Turn Proxy").font(.title).bold()
                          Text("Статус: \(vpnStatus)").foregroundColor(.secondary)
                            if !statusMessage.isEmpty {
                              Text(statusMessage)
                                .font(.footnote)
                                .foregroundColor(.orange)
                                .multilineTextAlignment(.center)
                                .padding(.horizontal)
                            }
                          
                          VStack(alignment: .leading, spacing: 10) {
                              Text("Ссылка на звонок ВК:")
                              TextField("https://...", text: $vkLink).textFieldStyle(.roundedBorder).autocapitalization(.none)
                              
                              Text("IP:Port вашего сервера (Peer):")
                              TextField("1.2.3.4:56000", text: $wgEndpoint).textFieldStyle(.roundedBorder).autocapitalization(.none)

                              Text("WG Private Key:")
                              TextField("Private Key", text: $wgPrivateKey).textFieldStyle(.roundedBorder)
                              
                              Text("WG Public Key:")
                              TextField("Public Key", text: $wgPublicKey).textFieldStyle(.roundedBorder)
                              
                              Text("WG Internal IP:")
                              TextField("10.0.0.2/32", text: $wgAddress).textFieldStyle(.roundedBorder)

                              HStack {
                                  Text("Потоки (-n):")
                                  TextField("4", text: $threads).textFieldStyle(.roundedBorder).frame(width: 50)
                                  Toggle("Использовать UDP", isOn: $useUDP)
                              }
                          }.padding()
                          
                          Button(action: {
                              if vpnStatus == "Подключено" { stopVPN() } else { saveAndStartVPN() }
                          }) {
                              Text(vpnStatus == "Подключено" ? "Отключить" : "Подключить")
                                  .frame(maxWidth: .infinity).padding()
                                  .background(vpnStatus == "Подключено" ? Color.red : Color.blue)
                                  .foregroundColor(.white).cornerRadius(10)
                          }.padding(.horizontal)
                      }
                            }
                            .onAppear {
                              reloadSettingsFromSharedDefaults()
                              updateStatus()
                            }
              }

                          private func reloadSettingsFromSharedDefaults() {
                            let settings = VPNSettings.load(from: sharedDefaults)
                            vkLink = settings.vkLink
                            wgEndpoint = settings.wgEndpoint
                            wgPrivateKey = settings.wgPrivateKey
                            wgPublicKey = settings.wgPublicKey
                            wgAddress = settings.wgAddress
                            useUDP = settings.useUDP
                            threads = settings.threads
                          }

                          private func persistSettings() {
                            let sanitizedThreads = max(Int(threads) ?? 4, 1)
                            threads = String(sanitizedThreads)

                            let settings = VPNSettings(
                              vkLink: vkLink.trimmingCharacters(in: .whitespacesAndNewlines),
                              wgEndpoint: wgEndpoint.trimmingCharacters(in: .whitespacesAndNewlines),
                              wgPrivateKey: wgPrivateKey.trimmingCharacters(in: .whitespacesAndNewlines),
                              wgPublicKey: wgPublicKey.trimmingCharacters(in: .whitespacesAndNewlines),
                              wgAddress: wgAddress.trimmingCharacters(in: .whitespacesAndNewlines),
                              useUDP: useUDP,
                              threads: threads
                            )
                            settings.save(to: sharedDefaults)
                          }
              
              func saveAndStartVPN() {
                            persistSettings()
                            statusMessage = ""

                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                      let manager = managers?.first ?? NETunnelProviderManager()
                      let protocolConfig = NETunnelProviderProtocol()
                              protocolConfig.providerBundleIdentifier = SharedConfig.vpnBundleIdentifier
                      protocolConfig.serverAddress = "VK-TURN"
                      
                              // Keep providerConfiguration for backward compatibility,
                              // while extension primarily reads from App Group shared defaults.
                      protocolConfig.providerConfiguration = [
                                SharedConfig.Keys.vkLink: vkLink,
                                SharedConfig.Keys.wgEndpoint: wgEndpoint,
                                SharedConfig.Keys.wgPrivateKey: wgPrivateKey,
                                SharedConfig.Keys.wgPublicKey: wgPublicKey,
                                SharedConfig.Keys.wgAddress: wgAddress,
                                SharedConfig.Keys.useUDP: useUDP,
                                SharedConfig.Keys.threads: threads
                      ] as [String : Any]
                      
                      manager.protocolConfiguration = protocolConfig
                      manager.isEnabled = true
                      manager.localizedDescription = "VK Turn Proxy"
                      
                              manager.saveToPreferences { saveError in
                                if let saveError {
                                  DispatchQueue.main.async {
                                    statusMessage = "Не удалось сохранить VPN-профиль: \(saveError.localizedDescription). Проверьте Signing, App Groups и entitlement Network Extension (требуется платный Apple Developer аккаунт)."
                                  }
                                  return
                                }

                                manager.loadFromPreferences { loadError in
                                  if let loadError {
                                    DispatchQueue.main.async {
                                      statusMessage = "Профиль сохранен, но не удалось перечитать настройки: \(loadError.localizedDescription)"
                                    }
                                    return
                                  }

                                  do {
                                    try manager.connection.startVPNTunnel()
                                    DispatchQueue.main.async {
                                      updateStatus()
                                    }
                                  } catch {
                                    DispatchQueue.main.async {
                                      statusMessage = "Не удалось запустить VPN: \(error.localizedDescription)"
                                      updateStatus()
                                    }
                                  }
                                }
                      }
                  }
              }

              func stopVPN() {
                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                      managers?.first?.connection.stopVPNTunnel()
                              DispatchQueue.main.async {
                                updateStatus()
                              }
                  }
              }

              func updateStatus() {
                  NETunnelProviderManager.loadAllFromPreferences { managers, _ in
                              DispatchQueue.main.async {
                                if let m = managers?.first, m.connection.status != .disconnected {
                                  vpnStatus = "Подключено"
                                } else {
                                  vpnStatus = "Отключено"
                                }
                              }
                  }
              }
          }
          EOF

      - name: Write PacketTunnelProvider.swift
        run: |
          cat << 'EOF' > Extension/Sources/PacketTunnelProvider.swift
          import NetworkExtension
          import WireGuardKit
          import WireGuardKitC

          class PacketTunnelProvider: NEPacketTunnelProvider {
              private var adapter: WireGuardAdapter?

              override func startTunnel(options: [String : NSObject]?, completionHandler: @escaping (Error?) -> Void) {
              let sharedDefaults = SharedConfig.sharedDefaults()
              var settings = VPNSettings.load(from: sharedDefaults)

              // Fallback to providerConfiguration for compatibility with older profiles.
              if let config = (protocolConfiguration as? NETunnelProviderProtocol)?.providerConfiguration {
                if let value = config[SharedConfig.Keys.vkLink] as? String, !value.isEmpty { settings.vkLink = value }
                if let value = config[SharedConfig.Keys.wgEndpoint] as? String, !value.isEmpty { settings.wgEndpoint = value }
                if let value = config[SharedConfig.Keys.wgPrivateKey] as? String, !value.isEmpty { settings.wgPrivateKey = value }
                if let value = config[SharedConfig.Keys.wgPublicKey] as? String, !value.isEmpty { settings.wgPublicKey = value }
                if let value = config[SharedConfig.Keys.wgAddress] as? String, !value.isEmpty { settings.wgAddress = value }
                if let value = config[SharedConfig.Keys.useUDP] as? Bool { settings.useUDP = value }
                if let value = config[SharedConfig.Keys.useUDP] as? String { settings.useUDP = (value as NSString).boolValue }
                if let value = config[SharedConfig.Keys.threads] as? String, !value.isEmpty { settings.threads = value }
              }

              guard !settings.wgPrivateKey.isEmpty,
                !settings.wgPublicKey.isEmpty,
                !settings.wgAddress.isEmpty,
                !settings.vkLink.isEmpty else {
                completionHandler(NSError(
                  domain: "VKProxy",
                  code: 1001,
                  userInfo: [NSLocalizedDescriptionKey: "Отсутствуют обязательные параметры VPN в App Group storage"]
                ))
                return
              }

              settings.save(to: sharedDefaults)

              let threadCount = max(Int(settings.threads) ?? 4, 1)
                  
              var proxyArgs = "-local 127.0.0.1:9000 -remote \(settings.wgEndpoint) -n \(threadCount)"
              if settings.useUDP { proxyArgs += " -udp" }
              proxyArgs += " \(settings.vkLink)"
                  
                  // Запускаем наше C/Go ядро напрямую
                  proxyArgs.withCString { cString in
                      StartVKProxy(UnsafeMutablePointer(mutating: cString))
                  }

                  let wgConfigString = """
                  [Interface]
              PrivateKey = \(settings.wgPrivateKey)
              Address = \(settings.wgAddress)
                  MTU = 1280

                  [Peer]
              PublicKey = \(settings.wgPublicKey)
                  AllowedIPs = 0.0.0.0/0
                  Endpoint = 127.0.0.1:9000
                  PersistentKeepalive = 25
                  """
                  
                  do {
                      let tunnelConfig = try TunnelConfiguration(fromWgQuickConfig: wgConfigString, called: "VKProxy")
                      adapter = WireGuardAdapter(with: self) { level, msg in
                          NSLog("[WireGuard] %@", msg)
                      }
                      adapter?.start(tunnelConfiguration: tunnelConfig) { err in
                          completionHandler(err)
                      }
                  } catch {
                      completionHandler(error)
                  }
              }

              override func stopTunnel(with reason: NEProviderStopReason, completionHandler: @escaping () -> Void) {
                  adapter?.stop { _ in completionHandler() }
              }
          }
          EOF

      - name: Write project.yml
        run: |
          cat << 'EOF' > project.yml
          name: VKProxy
          options:
            bundleIdPrefix: com.vkproxy
          packages:
            WireGuardKit:
              path: passepartoutvpn-wireguard-apple
          targets:
            VKProxyApp:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - App/Sources
                - Shared/Sources
              settings:
                CODE_SIGNING_ALLOWED: NO
                PRODUCT_BUNDLE_IDENTIFIER: com.vkproxy.app
                LIBRARY_SEARCH_PATHS: 
                  - "$(inherited)"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo/out"
              info:
                path: App/Info.plist
                properties:
                  CFBundleIdentifier: com.vkproxy.app
                  CFBundleName: VKProxy
                  CFBundleShortVersionString: "1.0"
                  CFBundleVersion: "1"
                  UILaunchStoryboardName: LaunchScreen
              entitlements:
                path: App/App.entitlements
                properties:
                  com.apple.developer.networking.networkextension: [packet-tunnel-provider]
                  com.apple.security.application-groups:
                    - group.com.vkproxy.app
              dependencies:
                - target: Extension
                  embed: true

            Extension:
              type: app-extension
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - Extension/Sources
                - Shared/Sources
              settings:
                CODE_SIGNING_ALLOWED: NO
                PRODUCT_BUNDLE_IDENTIFIER: com.vkproxy.app.Extension
                LIBRARY_SEARCH_PATHS: 
                  - "$(inherited)"
                  - "$(SRCROOT)/passepartoutvpn-wireguard-apple/Sources/WireGuardKitGo/out"
              info:
                path: Extension/Info.plist
                properties:
                  CFBundleIdentifier: com.vkproxy.app.Extension
                  CFBundleName: Extension
                  CFBundleShortVersionString: "1.0"
                  CFBundleVersion: "1"
                  NSExtension:
                    NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
                    NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
              entitlements:
                path: Extension/Extension.entitlements
                properties:
                  com.apple.developer.networking.networkextension: [packet-tunnel-provider]
                  com.apple.security.application-groups:
                    - group.com.vkproxy.app
              dependencies:
                - package: WireGuardKit
          EOF

      - name: Write README.md
        run: |
          cat << 'EOF' > README.md
          # VKProxy iOS Build Pipeline

          This repository contains a CI pipeline that generates and builds an iOS app with a Packet Tunnel VPN extension based on WireGuardKit and vk-turn-proxy.

          ## Runtime Architecture

          - App target and extension target share VPN settings via App Group storage.
          - Shared settings model is implemented in `Shared/Sources/SharedConfig.swift`.
          - Main app writes settings to `UserDefaults(suiteName: "group.com.vkproxy.app")`.
          - Extension reads the same storage in `PacketTunnelProvider`.

          ## Xcode Manual Setup (Required)

          After generating `VKProxy.xcodeproj`, open it in Xcode and verify capabilities for both targets (`VKProxyApp` and `Extension`):

          1. Signing & Capabilities -> add **App Groups**.
          2. Ensure `group.com.vkproxy.app` is present and selected for both targets.
          3. Ensure **Network Extensions** capability is present.

          ## Important Apple Requirement

          Packet Tunnel VPN requires Apple Network Extension entitlement approval.

          - Without proper entitlement, `NETunnelProviderManager.saveToPreferences` can fail with permission errors.
          - A paid Apple Developer account is required for real-device deployment.

          ## CI Note

          Current workflow builds unsigned artifacts (`CODE_SIGNING_ALLOWED=NO`) for reproducible CI output. For installable builds, configure signing and provisioning profiles in your own environment.
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild clean build \
            -project VKProxy.xcodeproj \
            -scheme VKProxyApp \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=${PWD}/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/VKProxyApp.app Payload/
          zip -r VKProxy.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VKProxy-iOS-App
          path: VKProxy.ipa
